<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS — Нэвтрэх</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="role-page">

    <div class="role-title">
        <h1>📊 Зээл Төлүүлэх Удирдлагын Систем</h1>
        <p>Collection Management System — Хэрэглэгчээ сонгоно уу</p>
    </div>

    <div class="role-grid">
        {% for user in users %}
            {% set meta = dashboard_meta.get(user.role.dashboard_code, default_meta) %}
            <form method="POST" action="{{ url_for('auth.login') }}">
                <input type="hidden" name="user_id" value="{{ user.id }}">
                <button type="submit" class="role-card">
                    <div class="role-accent" style="background:{{ meta.color }}"></div>
                    <span class="icon">{{ meta.icon }}</span>
                    <h3>{{ user.name }}</h3>
                    <div class="sub">
                        {{ user.role.name_mn }}
                        {% if user.branch %}<br>🏢 {{ user.branch.name }}{% endif %}
                    </div>
                </button>
            </form>
        {% endfor %}
    </div>

</div>
</body>
</html>
